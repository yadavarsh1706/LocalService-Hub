<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>My Bookings - LocalService Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div id="nav"></div><div id="toast"></div>

<div class="page-wrap">
  <div class="page-header">
    <div><div class="page-title">My Bookings</div><div class="text-muted">Track all your service requests</div></div>
    <a href="browse.html" class="btn btn-accent"><i class="fas fa-plus"></i> New Booking</a>
  </div>

  <div class="filter-tabs">
    <button class="ftab active" data-s="all">All</button>
    <button class="ftab" data-s="pending">Pending</button>
    <button class="ftab" data-s="accepted">Accepted</button>
    <button class="ftab" data-s="completed">Completed</button>
  </div>

  <div id="list">
    <div style="text-align:center;color:var(--muted);padding:2rem"><div class="spinner"></div></div>
  </div>
</div>

<footer>&copy; 2026 LocalService Hub</footer>
<script src="js/app.js"></script>
<script>
let activeStatus = 'all';

// Redirect if not logged in
getUser().then(u => {
  if (!u) { location.href = 'login.html'; return; }
  if (u.type !== 'customer') { location.href = 'index.html'; return; }
  loadBookings();
});

document.querySelectorAll('.ftab').forEach(b => b.onclick = function() {
  activeStatus = this.dataset.s;
  document.querySelectorAll('.ftab').forEach(x => x.classList.remove('active'));
  this.classList.add('active');
  loadBookings();
});

async function loadBookings() {
  const res = await apiGet('bookings.php', { action: 'my-bookings', status: activeStatus });
  const el  = document.getElementById('list');

  if (!res.success) { el.innerHTML = '<p class="text-muted" style="text-align:center;padding:2rem">Failed to load bookings.</p>'; return; }

  if (!res.bookings.length) {
    el.innerHTML = `<div class="card card-body" style="text-align:center;padding:3rem;color:var(--muted)">
      <i class="fas fa-calendar-times" style="font-size:2.5rem;display:block;margin-bottom:.75rem"></i>
      No ${activeStatus !== 'all' ? activeStatus : ''} bookings found.
      <br/><a href="browse.html" class="btn btn-primary" style="margin-top:1rem">Find a Provider</a></div>`;
    return;
  }

  el.innerHTML = res.bookings.map(b => `
  <div class="card" style="margin-bottom:.85rem;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.4rem;flex-wrap:wrap;gap:.75rem">
    <div class="flex items-center" style="gap:.75rem">
      <div class="avatar">${b.provider_name[0]}</div>
      <div>
        <div style="font-weight:600">${b.provider_name}</div>
        <div class="text-muted">${b.service}</div>
        <div class="text-muted" style="font-size:.78rem;margin-top:.15rem">
          <i class="fas fa-calendar" style="margin-right:4px"></i>${fmtDate(b.book_date)}
        </div>
      </div>
    </div>
    <div style="text-align:right">
      <div style="font-weight:700;color:var(--accent);margin-bottom:.35rem">${fmtPrice(b.price)}</div>
      ${badge(b.status)}
    </div>
  </div>`).join('');
}
</script>
</body>
</html>
