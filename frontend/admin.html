<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Panel - LocalService Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div id="toast"></div>

<!-- Admin Navbar -->
<nav class="navbar">
  <a href="index.html" class="brand"><i class="fas fa-shield-alt"></i> Admin Panel</a>
  <div style="display:flex;align-items:center">
    <a href="index.html" target="_blank" style="color:#bfdbfe;font-size:.875rem">View Site</a>
    <button class="btn btn-sm" style="background:#ef4444;color:#fff;margin-left:1rem" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-header">
    <div><div class="page-title">Dashboard Overview</div><div class="text-muted">Platform statistics at a glance</div></div>
  </div>

  <!-- Stats -->
  <div class="grid-4" style="margin-bottom:1.75rem">
    <div class="card stat-box">
      <div class="stat-icon ic-blue"><i class="fas fa-users"></i></div>
      <div class="stat-num" id="s-cust">—</div><div class="stat-lbl">Customers</div>
    </div>
    <div class="card stat-box">
      <div class="stat-icon" style="background:#f3e8ff;color:#7e22ce"><i class="fas fa-hard-hat"></i></div>
      <div class="stat-num" id="s-prov">—</div><div class="stat-lbl">Providers</div>
    </div>
    <div class="card stat-box">
      <div class="stat-icon ic-green"><i class="fas fa-calendar-check"></i></div>
      <div class="stat-num" id="s-book">—</div><div class="stat-lbl">Bookings</div>
    </div>
    <div class="card stat-box">
      <div class="stat-icon ic-yellow"><i class="fas fa-clock"></i></div>
      <div class="stat-num" id="s-pend">—</div><div class="stat-lbl">Pending</div>
    </div>
  </div>

  <!-- All Bookings Table -->
  <div class="card" style="margin-bottom:1.75rem">
    <div class="card-header">
      All Bookings
      <span id="bcount" class="text-muted" style="font-weight:400;font-size:.8rem"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Customer</th>
            <th>Provider</th>
            <th>Service</th>
            <th>Date</th>
            <th>Price</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="btb">
          <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)"><div class="spinner"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- All Providers List -->
  <div class="card">
    <div class="card-header">All Providers</div>
    <div id="ptb">
      <div style="text-align:center;padding:2rem;color:var(--muted)"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<footer>&copy; 2026 LocalService Hub — 4th Semester Project</footer>
<script src="js/app.js"></script>
<script>
// Auth check — admin only
getUser().then(u => {
  if (!u) { location.href = 'login.html'; return; }
  if (u.type !== 'admin') { location.href = 'index.html'; return; }
  loadStats();
  loadBookings();
  loadProviders();
});

async function loadStats() {
  const res = await apiGet('admin.php', { action: 'stats' });
  if (!res.success) return;
  const s = res.stats;
  document.getElementById('s-cust').textContent = s.customers;
  document.getElementById('s-prov').textContent = s.providers;
  document.getElementById('s-book').textContent = s.bookings;
  document.getElementById('s-pend').textContent = s.pending;
}

async function loadBookings() {
  const res = await apiGet('admin.php', { action: 'bookings' });
  const tb  = document.getElementById('btb');
  if (!res.success) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:1.5rem;color:var(--muted)">Failed to load.</td></tr>'; return; }

  document.getElementById('bcount').textContent = res.bookings.length + ' total';

  tb.innerHTML = res.bookings.length
    ? res.bookings.map((b, i) => `
      <tr>
        <td>${i + 1}</td>
        <td style="font-weight:500">${b.customer_name}</td>
        <td>${b.provider_name}</td>
        <td class="text-muted">${b.service}</td>
        <td class="text-muted">${fmtDate(b.book_date)}</td>
        <td style="font-weight:600;color:var(--accent)">${fmtPrice(b.price)}</td>
        <td>${badge(b.status)}</td>
      </tr>`).join('')
    : '<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--muted)">No bookings yet.</td></tr>';
}

async function loadProviders() {
  const res = await apiGet('admin.php', { action: 'providers' });
  const el  = document.getElementById('ptb');
  if (!res.success) { el.innerHTML = '<p style="padding:1rem;color:var(--muted)">Failed to load.</p>'; return; }

  el.innerHTML = res.providers.map(p => `
  <div style="padding:.9rem 1.4rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.5rem">
    <div class="flex items-center" style="gap:.75rem">
      <div class="avatar" style="width:36px;height:36px;font-size:.9rem;border-radius:8px">${p.biz_name[0]}</div>
      <div>
        <div style="font-weight:600;font-size:.875rem">${p.biz_name}</div>
        <div class="text-muted">${p.owner_name} · ${p.category_name} · ${p.experience} yrs</div>
        <div class="text-muted" style="font-size:.78rem">${p.email} ${p.phone ? '· ' + p.phone : ''}</div>
      </div>
    </div>
    <div class="flex items-center" style="gap:.75rem">
      <div>${stars(p.rating)} <span class="text-muted">${p.rating}</span></div>
      <span style="font-size:.68rem;background:#dcfce7;color:#166534;padding:.15rem .5rem;border-radius:100px">✓ Verified</span>
    </div>
  </div>`).join('');
}
</script>
</body>
</html>
