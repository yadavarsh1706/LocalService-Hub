<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login - LocalService Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div id="toast"></div>
<div class="auth-wrap">
  <div class="auth-card card">
    <div class="card-body">
      <div style="text-align:center;margin-bottom:1.5rem">
        <a href="index.html" style="color:var(--primary);font-weight:700;font-size:1.1rem">
          <i class="fas fa-tools" style="color:var(--accent)"></i> LocalService Hub
        </a>
        <h2 style="margin-top:.75rem;font-size:1.4rem">Welcome Back!</h2>
        <p class="text-muted">Login to your account</p>
      </div>

      <div id="err" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pass" placeholder="Your password"/>
      </div>
      <button class="btn btn-primary btn-full" id="btn" onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>

      <p class="text-muted" style="text-align:center;margin-top:1rem;font-size:.85rem">
        No account? <a href="register.html" style="color:var(--primary);font-weight:600">Register Free</a>
      </p>

      <!-- Demo hint -->
      <div style="background:#eff6ff;border-radius:8px;padding:.9rem;margin-top:1.25rem;font-size:.78rem;color:#1e40af">
        <strong>Demo accounts (password: 123456)</strong><br/>
        <span style="cursor:pointer" onclick="fill('customer@lsh.com')">👤 customer@lsh.com</span> &nbsp;
        <span style="cursor:pointer" onclick="fill('provider@lsh.com')">🔧 provider@lsh.com</span> &nbsp;
        <span style="cursor:pointer" onclick="fill('admin@lsh.com')">🛡️ admin@lsh.com</span>
      </div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
function fill(e) {
  document.getElementById('email').value = e;
  document.getElementById('pass').value  = '123456';
}

// If already logged in, redirect
getUser().then(u => { if (u) location.href = 'index.html'; });

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const errEl = document.getElementById('err');
  const btn   = document.getElementById('btn');

  errEl.classList.add('hidden');

  if (!email || !pass) {
    errEl.textContent = '⚠️ Email and password required.';
    errEl.classList.remove('hidden');
    return;
  }

  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span> Logging in...';

  const res = await apiPost('auth.php', 'login', { email, password: pass });

  if (res.success) {
    toast('Welcome, ' + res.user.name + '!');
    setTimeout(() => {
      const dest = res.user.type === 'admin' ? 'admin.html'
                 : res.user.type === 'provider' ? 'provider.html'
                 : 'bookings.html';
      location.href = dest;
    }, 700);
  } else {
    errEl.textContent = '⚠️ ' + (res.message || 'Login failed.');
    errEl.classList.remove('hidden');
    btn.disabled  = false;
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
  }
}
</script>
</body>
</html>
