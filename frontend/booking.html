<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Book Service - LocalService Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div id="nav"></div><div id="toast"></div>

<div class="page-wrap" style="max-width:560px">
  <a href="browse.html" style="color:var(--primary);font-size:.875rem;display:inline-block;margin-bottom:1.25rem">
    <i class="fas fa-arrow-left"></i> Back to Browse
  </a>

  <!-- Provider info card -->
  <div class="card card-body" id="pcard" style="margin-bottom:1.25rem">
    <div style="text-align:center;padding:1rem;color:var(--muted)"><div class="spinner"></div> Loading...</div>
  </div>

  <!-- Booking form -->
  <div class="card">
    <div class="card-header">Request Booking</div>
    <div class="card-body">

      <!-- Success state -->
      <div id="suc" class="hidden" style="text-align:center;padding:1.5rem 0">
        <div style="width:70px;height:70px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2rem;color:var(--success)">
          <i class="fas fa-check-circle"></i>
        </div>
        <h3 style="font-weight:700;margin-bottom:.4rem">Booking Confirmed!</h3>
        <p class="text-muted" style="margin-bottom:1.25rem">Provider will confirm shortly.</p>
        <div id="summary" style="background:#f8fafc;border-radius:8px;padding:.9rem;text-align:left;font-size:.85rem;margin-bottom:1.25rem"></div>
        <div style="display:flex;gap:.75rem">
          <a href="bookings.html" class="btn btn-primary" style="flex:1;justify-content:center">My Bookings</a>
          <a href="browse.html"   class="btn btn-outline" style="flex:1;justify-content:center">Book Another</a>
        </div>
      </div>

      <!-- Form -->
      <div id="formWrap">
        <div class="form-group">
          <label>Select Service *</label>
          <select id="svc" onchange="updatePrice()">
            <option value="">-- Choose --</option>
          </select>
          <div id="pd" class="hidden" style="margin-top:.4rem;font-weight:600;color:var(--accent);font-size:.875rem"></div>
        </div>
        <div class="form-group">
          <label>Booking Date *</label>
          <input type="date" id="dt"/>
        </div>
        <div class="form-group">
          <label>Description (optional)</label>
          <textarea id="desc" rows="2" placeholder="Describe your problem briefly..."></textarea>
        </div>
        <button class="btn btn-accent btn-full" id="btn" onclick="doBook()">
          <i class="fas fa-calendar-check"></i> Confirm Booking
        </button>
      </div>

    </div>
  </div>
</div>

<footer>&copy; 2026 LocalService Hub</footer>
<script src="js/app.js"></script>
<script>
const pid = parseInt(new URLSearchParams(location.search).get('id')) || 1;
let provider = null;

document.getElementById('dt').min = new Date().toISOString().split('T')[0];

async function loadProvider() {
  const res = await apiGet('providers.php', { action: 'detail', id: pid });
  if (!res.success) { toast('Provider not found', 'e'); return; }
  provider = res.provider;

  document.getElementById('pcard').innerHTML = `
  <div class="flex items-center" style="gap:.75rem">
    <div class="avatar" style="width:54px;height:54px;font-size:1.3rem;border-radius:12px">${provider.biz_name[0]}</div>
    <div>
      <div style="font-weight:700;font-size:1rem">${provider.biz_name}</div>
      <div class="text-muted">${provider.owner_name} · ${provider.experience} yrs exp</div>
      <div style="margin-top:.3rem">${stars(provider.rating)} <span class="text-muted">${provider.rating}</span>
        <span style="font-size:.68rem;background:#dcfce7;color:#166534;padding:.1rem .4rem;border-radius:100px;margin-left:.4rem">✓ Verified</span>
      </div>
    </div>
  </div>`;

  const sel = document.getElementById('svc');
  provider.services.forEach(s => {
    sel.innerHTML += `<option value="${s.name}" data-p="${s.price}">${s.name} — ${fmtPrice(s.price)}</option>`;
  });
}

function updatePrice() {
  const sel = document.getElementById('svc');
  const opt = sel.options[sel.selectedIndex];
  const pd  = document.getElementById('pd');
  if (opt && opt.dataset.p) {
    pd.textContent = 'Charge: ' + fmtPrice(opt.dataset.p);
    pd.classList.remove('hidden');
  } else {
    pd.classList.add('hidden');
  }
}

async function doBook() {
  const user = await getUser();
  if (!user) { toast('Please login first', 'e'); setTimeout(() => location.href = 'login.html', 1000); return; }

  const svc  = document.getElementById('svc').value;
  const dt   = document.getElementById('dt').value;
  const desc = document.getElementById('desc').value.trim();
  const sel  = document.getElementById('svc');
  const price = sel.options[sel.selectedIndex]?.dataset.p || provider.price;

  if (!svc || !dt) { toast('Select service and date', 'e'); return; }

  const btn = document.getElementById('btn');
  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span> Processing...';

  const res = await apiPost('bookings.php', 'create', {
    provider_id: provider.id,
    service:     svc,
    book_date:   dt,
    description: desc,
    price:       parseFloat(price),
  });

  if (res.success) {
    document.getElementById('formWrap').classList.add('hidden');
    document.getElementById('suc').classList.remove('hidden');
    document.getElementById('summary').innerHTML = `
      <p style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:.3rem 0"><span>Provider</span><strong>${provider.biz_name}</strong></p>
      <p style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:.3rem 0"><span>Service</span><strong>${svc}</strong></p>
      <p style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding:.3rem 0"><span>Date</span><strong>${fmtDate(dt)}</strong></p>
      <p style="display:flex;justify-content:space-between;padding:.3rem 0"><span>Price</span><strong style="color:var(--accent)">${fmtPrice(price)}</strong></p>`;
  } else {
    toast(res.message || 'Booking failed', 'e');
    btn.disabled  = false;
    btn.innerHTML = '<i class="fas fa-calendar-check"></i> Confirm Booking';
  }
}

loadProvider();
</script>
</body>
</html>
