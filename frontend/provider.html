<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Provider Dashboard - LocalService Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div id="nav"></div><div id="toast"></div>

<div class="page-wrap">
  <div class="page-header">
    <div><div class="page-title">Provider Dashboard</div><div class="text-muted" id="wc">Welcome!</div></div>
  </div>

  <!-- Stats -->
  <div class="grid-4" style="margin-bottom:1.75rem">
    <div class="card stat-box">
      <div class="stat-icon ic-blue"><i class="fas fa-calendar"></i></div>
      <div class="stat-num" id="st">—</div><div class="stat-lbl">Total</div>
    </div>
    <div class="card stat-box">
      <div class="stat-icon ic-yellow"><i class="fas fa-clock"></i></div>
      <div class="stat-num" id="sp">—</div><div class="stat-lbl">Pending</div>
    </div>
    <div class="card stat-box">
      <div class="stat-icon ic-green"><i class="fas fa-check-circle"></i></div>
      <div class="stat-num" id="sc">—</div><div class="stat-lbl">Completed</div>
    </div>
    <div class="card stat-box">
      <div class="stat-icon" style="background:#ffedd5;color:#ea580c"><i class="fas fa-rupee-sign"></i></div>
      <div class="stat-num" id="se">—</div><div class="stat-lbl">Earnings</div>
    </div>
  </div>

  <!-- Requests -->
  <div class="card">
    <div class="card-header">
      Booking Requests
      <div class="filter-tabs" style="margin:0">
        <button class="ftab active" data-s="all">All</button>
        <button class="ftab" data-s="pending">Pending</button>
        <button class="ftab" data-s="accepted">Accepted</button>
        <button class="ftab" data-s="completed">Completed</button>
      </div>
    </div>
    <div id="reqs">
      <div style="text-align:center;padding:2rem;color:var(--muted)"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<footer>&copy; 2026 LocalService Hub</footer>
<script src="js/app.js"></script>
<script>
let activeStatus = 'all';

// Auth check
getUser().then(u => {
  if (!u) { location.href = 'login.html'; return; }
  if (u.type !== 'provider') { location.href = 'index.html'; return; }
  document.getElementById('wc').textContent = 'Welcome, ' + u.name;
  loadRequests();
});

document.querySelectorAll('.ftab').forEach(b => b.onclick = function() {
  activeStatus = this.dataset.s;
  document.querySelectorAll('.ftab').forEach(x => x.classList.remove('active'));
  this.classList.add('active');
  loadRequests();
});

async function loadRequests() {
  const res = await apiGet('bookings.php', { action: 'provider-requests', status: activeStatus });
  if (!res.success) { toast('Failed to load requests', 'e'); return; }

  // Update stats
  const s = res.stats;
  document.getElementById('st').textContent = s.total;
  document.getElementById('sp').textContent = s.pending;
  document.getElementById('sc').textContent = s.completed;
  document.getElementById('se').textContent = fmtPrice(s.earnings);

  const el = document.getElementById('reqs');
  if (!res.requests.length) {
    el.innerHTML = `<div style="text-align:center;padding:2.5rem;color:var(--muted)">
      No ${activeStatus !== 'all' ? activeStatus : ''} requests.</div>`;
    return;
  }

  el.innerHTML = res.requests.map(r => `
  <div style="padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:.75rem">
    <div class="flex items-center" style="gap:.75rem">
      <div class="avatar" style="background:linear-gradient(135deg,#6b7280,#9ca3af)">${r.customer_name[0]}</div>
      <div>
        <div style="font-weight:600;font-size:.9rem">${r.customer_name}</div>
        <div class="text-muted">${r.service} — <strong style="color:var(--accent)">${fmtPrice(r.price)}</strong></div>
        <div class="text-muted" style="font-size:.78rem">
          <i class="fas fa-calendar" style="margin-right:3px"></i>${fmtDate(r.book_date)}
        </div>
        ${r.description ? `<div class="text-muted" style="font-size:.78rem;margin-top:.2rem;font-style:italic">"${r.description}"</div>` : ''}
      </div>
    </div>
    <div class="flex items-center" style="gap:.5rem">
      ${badge(r.status)}
      ${r.status === 'pending'
        ? `<button class="btn btn-sm btn-success" onclick="updateStatus(${r.id},'accepted')"><i class="fas fa-check"></i> Accept</button>
           <button class="btn btn-sm btn-danger"  onclick="updateStatus(${r.id},'rejected')"><i class="fas fa-times"></i> Reject</button>`
        : r.status === 'accepted'
        ? `<button class="btn btn-sm" style="background:#3b82f6;color:#fff" onclick="updateStatus(${r.id},'completed')"><i class="fas fa-check-double"></i> Mark Complete</button>`
        : ''}
    </div>
  </div>`).join('');
}

async function updateStatus(bookingId, status) {
  const res = await apiPost('bookings.php', 'update-status', { booking_id: bookingId, status });
  if (res.success) {
    toast(res.message, 's');
    loadRequests();
  } else {
    toast(res.message || 'Failed to update', 'e');
  }
}
</script>
</body>
</html>
