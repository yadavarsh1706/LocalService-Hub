<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register - LocalService Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
<div id="toast"></div>
<div class="auth-wrap">
  <div class="auth-card card">
    <div class="card-body">
      <div style="text-align:center;margin-bottom:1.25rem">
        <a href="index.html" style="color:var(--primary);font-weight:700;font-size:1.1rem">
          <i class="fas fa-tools" style="color:var(--accent)"></i> LocalService Hub
        </a>
        <h2 style="margin-top:.75rem;font-size:1.4rem">Create Account</h2>
      </div>

      <!-- Type Toggle -->
      <div class="toggle-tabs">
        <button id="tc" class="toggle-tab active" onclick="setType('customer')">
          <i class="fas fa-user"></i> Customer
        </button>
        <button id="tp" class="toggle-tab" onclick="setType('provider')">
          <i class="fas fa-briefcase"></i> Provider
        </button>
      </div>

      <div id="err" class="alert alert-error hidden"></div>
      <div id="suc" class="alert alert-success hidden"></div>

      <input type="hidden" id="utype" value="customer"/>

      <div class="grid-2">
        <div class="form-group"><label>Full Name *</label><input type="text" id="name"/></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="10-digit"/></div>
      </div>
      <div class="form-group"><label>Email *</label><input type="email" id="email"/></div>

      <!-- Provider extra fields -->
      <div id="pf" class="hidden">
        <div class="form-group"><label>Business Name</label><input type="text" id="biz" placeholder="e.g. Suresh Plumbing"/></div>
        <div class="grid-2">
          <div class="form-group">
            <label>Category *</label>
            <select id="cat">
              <option value="1">Plumbing</option>
              <option value="2">Electrical</option>
              <option value="3">Cleaning</option>
              <option value="4">Painting</option>
              <option value="5">Tutoring</option>
            </select>
          </div>
          <div class="form-group"><label>Experience (yrs)</label><input type="number" id="exp" value="1" min="0"/></div>
        </div>
        <div class="form-group"><label>Base Price (₹)</label><input type="number" id="price" value="500" min="0"/></div>
      </div>

      <div class="grid-2">
        <div class="form-group"><label>Password *</label><input type="password" id="pass" placeholder="Min 6 chars"/></div>
        <div class="form-group"><label>Confirm *</label><input type="password" id="conf"/></div>
      </div>

      <button class="btn btn-primary btn-full" id="btn" onclick="doRegister()">
        <i class="fas fa-user-plus"></i> Create Account
      </button>

      <p class="text-muted" style="text-align:center;margin-top:1rem;font-size:.85rem">
        Already registered? <a href="login.html" style="color:var(--primary);font-weight:600">Login</a>
      </p>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
function setType(t) {
  document.getElementById('utype').value = t;
  document.getElementById('pf').classList.toggle('hidden', t !== 'provider');
  document.getElementById('tc').classList.toggle('active', t === 'customer');
  document.getElementById('tp').classList.toggle('active', t === 'provider');
}

async function doRegister() {
  const errEl = document.getElementById('err');
  const sucEl = document.getElementById('suc');
  errEl.classList.add('hidden');
  sucEl.classList.add('hidden');

  const name  = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const conf  = document.getElementById('conf').value;
  const type  = document.getElementById('utype').value;

  if (!name || !email || !pass) { errEl.textContent = '⚠️ Fill all required fields.'; errEl.classList.remove('hidden'); return; }
  if (pass.length < 6)          { errEl.textContent = '⚠️ Password min 6 characters.'; errEl.classList.remove('hidden'); return; }
  if (pass !== conf)             { errEl.textContent = '⚠️ Passwords do not match.'; errEl.classList.remove('hidden'); return; }

  const body = {
    name, email, password: pass, type,
    phone:       document.getElementById('phone').value.trim(),
    biz_name:    document.getElementById('biz')?.value.trim()   || '',
    category_id: document.getElementById('cat')?.value          || 1,
    experience:  document.getElementById('exp')?.value          || 1,
    price:       document.getElementById('price')?.value        || 0,
  };

  const btn = document.getElementById('btn');
  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span> Creating...';

  const res = await apiPost('auth.php', 'register', body);

  if (res.success) {
    sucEl.textContent = '✅ ' + res.message;
    sucEl.classList.remove('hidden');
    setTimeout(() => location.href = 'login.html', 1500);
  } else {
    errEl.textContent = '⚠️ ' + (res.message || 'Registration failed.');
    errEl.classList.remove('hidden');
    btn.disabled  = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
  }
}
</script>
</body>
</html>
